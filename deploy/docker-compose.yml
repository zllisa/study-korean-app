version: '3.8'

services:
  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      PORT: 4000
      DATABASE_URL: "file:/data/prod.db"
      FRONTEND_URL: "https://aiphototo.com:9999"
    volumes:
      - db_data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
